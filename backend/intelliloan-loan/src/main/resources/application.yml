# intelliloan-loan/src/main/resources/application.yml
spring:
  application:
    name: intelliloan-loan-service

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: intelliloan
    password: IntelliLoan_App1
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: validate        # never let Hibernate alter schema in prod
    show-sql: false             # true only for debugging
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        default_schema: INTELLILOAN

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8082

logging:
  level:
    com.intelliloan: DEBUG
    org.springframework.web: INFO