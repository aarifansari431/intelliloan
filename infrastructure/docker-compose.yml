# infrastructure/docker-compose.yml
version: '3.9'

services:

  # ─── Database ────────────────────────────────────────────────
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: intelliloan-oracle
    environment:
      ORACLE_PASSWORD: IntelliLoan_Pass1
      APP_USER: intelliloan
      APP_USER_PASSWORD: IntelliLoan_App1
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: intelliloan-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass IntelliLoan_Redis1
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "IntelliLoan_Redis1", "ping"]
      interval: 10s
      retries: 5

  # ─── Zookeeper + Kafka ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: intelliloan-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: intelliloan-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ─── Backend services (stubs for now) ─────────────────────────
  auth-service:
    build: ../backend/intelliloan-auth
    container_name: intelliloan-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: intelliloan
      SPRING_DATASOURCE_PASSWORD: IntelliLoan_App1
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: IntelliLoan_Redis1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256bit-key}
    depends_on:
      oracle-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["backend"]

  loan-service:
    build: ../backend/intelliloan-loan
    container_name: intelliloan-loan
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: intelliloan
      SPRING_DATASOURCE_PASSWORD: IntelliLoan_App1
    depends_on:
      oracle-db:
        condition: service_healthy
    profiles: ["backend"]

  # ─── Nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: intelliloan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [auth-service, loan-service]
    profiles: ["backend"]

volumes:
  oracle-data:
  redis-data: